<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Leads Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
      background: #f8f9fa;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }
    th, td {
      padding: 12px;
      border: 1px solid #ddd;
      text-align: left;
    }
    th {
      background: #2a9d8f;
      color: #fff;
    }
  </style>
</head>
<body>

<h1>Lead Events</h1>
<button onclick="clearLeads()" style="margin-bottom:1rem;">
  Clear Leads
</button>
<table>
  <thead>
    <tr>
      <th>Action</th>
      <th>Time</th>
      <th>Page</th>
    </tr>
  </thead>
  <tbody id="leads"></tbody>
</table>

<script>
  const leads = JSON.parse(localStorage.getItem('leadEvents')) || [];
  const tbody = document.getElementById('leads');

  leads.reverse().forEach(lead => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${lead.action}</td>
      <td>${new Date(lead.time).toLocaleString()}</td>
      <td>${lead.page}</td>
    `;
    tbody.appendChild(row);
  });
  
    function clearLeads() {
      if (confirm('Clear all stored leads?')) {
        localStorage.removeItem('leadEvents');
        location.reload();
      }
    }

</script>

</body>
</html>
